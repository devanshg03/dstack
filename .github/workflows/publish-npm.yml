# Publishes to https://registry.npmjs.org when you publish a GitHub Release
# or run this workflow manually (Actions → Publish to npm → Run workflow).
#
# Add repo secret NPM_TOKEN: npmjs "Granular access token" with Publish access
# for package "create-dstack" (Automation bypasses 2FA on publish).

name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
